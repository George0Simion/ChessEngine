# Render Blueprint for ChessMate.
# Creates: a Postgres database, a shared secret group, and two web services
# (the Flask app + the multiplayer WebSocket server).
#
# After the FIRST deploy, set MP_WS_URL on the `chessmate-web` service to the
# multiplayer service's public URL, e.g. wss://chessmate-mp.onrender.com/ws,
# then redeploy chessmate-web. (Its URL isn't known until the mp service exists.)

databases:
  - name: chessmate-db
    plan: free

envVarGroups:
  # Shared so both services sign/verify JWTs with the same secret.
  - name: chessmate-secrets
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true

services:
  # ---- Flask app: bot, local, puzzles, history, review, analysis ----
  - type: web
    name: chessmate-web
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - fromGroup: chessmate-secrets
      - key: DATABASE_URL
        fromDatabase:
          name: chessmate-db
          property: connectionString
      - key: FLASK_ENV
        value: production
      - key: PYTHON_VERSION
        value: "3.12.6"
      - key: MP_WS_URL
        sync: false   # set after the mp service deploys: wss://<mp-host>/ws

  # ---- Multiplayer: live online play over WebSocket (FastAPI/uvicorn) ----
  - type: web
    name: chessmate-mp
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn multiplayer.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - fromGroup: chessmate-secrets
      - key: DATABASE_URL
        fromDatabase:
          name: chessmate-db
          property: connectionString
      - key: PYTHON_VERSION
        value: "3.12.6"
